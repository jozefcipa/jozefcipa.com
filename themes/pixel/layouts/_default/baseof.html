<!DOCTYPE html>
<html lang="en" data-scheme="c">
<head>
  {{- partial "head.html" . }}
</head>
<body>
  <div class="site">
    {{- partial "header.html" . }}
    <main class="site-main">
      {{- block "main" . }}{{ end }}
    </main>
    {{- partial "footer.html" . }}
  </div>
  {{- $js := resources.Get "js/main.js" | minify | fingerprint }}
  <script defer src="{{ $js.RelPermalink }}" integrity="{{ $js.Data.Integrity }}"></script>
</body>
</html>
