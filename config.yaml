baseURL: 'https://jozefcipa.com'
locale: en-us
title: Jozef Cipa
theme: pixel
enableRobotsTXT: true
pagination:
  pagerSize: 9
capitalizeListTitles: false # keep tag names lowercase
summaryLength: 30
taxonomies:
  tags: tags
outputFormats:
  rss:
    mediaType: application/rss+xml
    baseName: rss # serve the feed as /rss.xml instead of /index.xml
markup:
  goldmark:
    renderer:
      unsafe: true # raw <iframe>/<video> embeds in markdown posts
  highlight:
    noClasses: false # styled by the theme's chroma palette in css/main.css
params:
  description: a backend engineer with a passion for IoT and automation
  avatar: /assets/me-pixel.jpg
  images: # site-wide og:image fallback, used when a page has no cover of its own
    - /og-cover.png
menu:
  main:
    - identifier: home
      name: home
      url: /
      weight: 1
    - identifier: work
      name: work
      url: /work
      weight: 2
    - identifier: about
      name: about
      url: /about
      weight: 3
    - identifier: blog
      name: blog
      url: /blog
      weight: 4
    - identifier: projects
      name: projects
      url: /projects
      weight: 5
