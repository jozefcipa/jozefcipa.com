baseURL: 'https://jozefcipa.com'
locale: en-us
title: Jozef Cipa
theme: papermod
enableRobotsTXT: true
pagination:
  pagerSize: 10
capitalizeListTitles: false # keep tag names lowercase
summaryLength: 30
# googleAnalytics: 'UA-89527096-1'
taxonomies:
  tags: tags
markup:
  goldmark:
    renderer:
      unsafe: true # raw <iframe>/<video> embeds in markdown posts
params:
  description: a backend developer with a passion for IoT and automation
  assets:
    disableHLJS: true # all posts are Markdown now — Chroma highlights at build time
  images:
    - assets/meta-preview.jpg
  schema:
    publisherType: Person
  ShowReadingTime: true
  ShowShareButtons: true
  disableScrollToTop: true
  profileMode:
    enabled: true
  socialIcons:
    - name: linkedin
      url: 'https://linkedin.com/in/jozefcipa'
    - name: github
      url: 'https://github.com/jozefcipa'
menu:
  main:
    - identifier: home
      name: home
      url: /
      weight: 1
    - identifier: work
      name: work
      url: /work
      weight: 2
    - identifier: about
      name: about
      url: /about
      weight: 3
    - identifier: blog
      name: blog
      url: /blog
      weight: 4
    - identifier: projects
      name: projects
      url: /projects
      weight: 5